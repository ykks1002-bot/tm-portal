name: Daily Price Update (에듀윌 + 경쟁사)

on:
  schedule:
    # 매일 KST 00:00 = UTC 15:00
    - cron: '0 15 * * *'
  workflow_dispatch:
    inputs:
      force_rebuild:
        description: '강제 전체 재빌드'
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  update-prices:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          pip install requests beautifulsoup4 urllib3 playwright

      - name: Install Playwright Chromium
        run: playwright install chromium --with-deps

      - name: Scrape 에듀윌 + 경쟁사 prices
        run: python scripts/scrape_prices_ci.py
        continue-on-error: true

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet public/data/ || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit & push if prices changed
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/
          git commit -m "chore: 타사 가격 자동 업데이트 $(TZ=Asia/Seoul date '+%Y-%m-%d %H:%M KST')"
          git push

      - name: Trigger Pages deployment
        if: steps.changes.outputs.changed == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'deploy.yml',
              ref: 'main'
            })
